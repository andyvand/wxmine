<p class="rvps3"><span class="rvts6">Minesweeper scoring is simple. The counter in the upper-right corner of the playing area indicates your playing time. The faster you find all the mines, the better your score.&nbsp;</span></p>
<p class="rvps6"><span class="rvts10">To see a list of your fastest playing times</span></p>
<p class="rvps7"><img alt="" style="padding : 1px;" src="lib/bm1.png"><span class="rvts6"> &nbsp; &nbsp; &nbsp; &nbsp;</span><span class="rvts6">From the Game menu, choose Best Times.&nbsp;</span></p>
